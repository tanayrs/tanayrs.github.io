<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title id="page-title">Tanay Raghunandan Srinivasa — Project</title>

  <!-- Anti-flash: apply theme before first paint -->
  <script>
    const t = localStorage.getItem('theme');
    if (t === 'dark') document.documentElement.classList.add('dark');
  </script>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Merriweather:wght@400;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../assets/style.css">
</head>
<body>

  <!-- Sticky top bar: back link + theme toggle -->
  <div class="proj-topbar">
    <a href="../index.html" class="back-link">&#8592; Back</a>
    <div class="theme-toggle-wrap">
      <span class="toggle-icon">&#9728;</span>
      <label class="toggle-label" for="theme-switch">
        <input type="checkbox" id="theme-switch" class="hidden" />
        <div class="slider"></div>
      </label>
      <span class="toggle-icon">&#9790;</span>
    </div>
  </div>

  <!-- Project content -->
  <main class="project-detail">
    <h1 id="project-title" class="proj-title">Loading&hellip;</h1>
    <hr class="proj-divider" />
    <div id="project-content" class="project-body">
      <p class="proj-loading">Loading project details&hellip;</p>
    </div>
  </main>

  <script src="../assets/marked.min.js"></script>
  <script src="../assets/project.js"></script>
</body>
</html>
